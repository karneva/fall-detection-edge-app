services:
  edge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jetson-edge
    ports:
      - "8000:8000"

    # (1) Jetson에서 GPU 사용
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-all}

      # 앱 설정값
      - CAM_INDEX=${CAM_INDEX:-0}
      - CAM_DEVICE=${CAM_DEVICE:-}
      - FRAME_W=${FRAME_W:-1920}
      - FRAME_H=${FRAME_H:-1080}
      - JPEG_QUALITY=${JPEG_QUALITY:-80}
      - MODEL_PATH=${MODEL_PATH:-yolov8s-pose.pt}
      - DEFAULT_CONF=${DEFAULT_CONF:-0.50}
      - DETERMINISTIC=${DETERMINISTIC:-1}
      - USE_HALF=${USE_HALF:-0}
      - DEVICE_ID=${DEVICE_ID:-JETSON-EDGE-001}
      - DEVICE_NAME=${DEVICE_NAME:-Jetson-Orin-Nano}
      - LOCATION_ID=${LOCATION_ID:-default-location}
      - SERVER_URL=${SERVER_URL:-https://your-backend.example.com}
      - WS_SERVER_URL=${WS_SERVER_URL:-}
      - RPI_URL=${RPI_URL:-http://your-rpi-host:8080/eeum}
      - RPI_SERIAL_NUMBER=${RPI_SERIAL_NUMBER:-RPI-EDGE-001}
      - ESP32_SERIAL_NUMBER=${ESP32_SERIAL_NUMBER:-ESP32-EDGE-001}
      - ENABLE_BACKEND_STREAM=${ENABLE_BACKEND_STREAM:-0}
      - ENABLE_SERVER_REPORTING=${ENABLE_SERVER_REPORTING:-0}
      - ENABLE_RPI_EVENTS=${ENABLE_RPI_EVENTS:-0}
      - ENABLE_DEVICE_PAIRING=${ENABLE_DEVICE_PAIRING:-0}
      - RUNS_DIR=${RUNS_DIR:-/app/runs}
      - CLIP_DIR=${CLIP_DIR:-/app/runs/clips}
      - CLIP_FPS=${CLIP_FPS:-24}
      - CLIP_RESIZE_WIDTH=${CLIP_RESIZE_WIDTH:-640}
      - CLIP_RESIZE_HEIGHT=${CLIP_RESIZE_HEIGHT:-480}
      - CLIP_PRE_SEC=${CLIP_PRE_SEC:-6}
      - CLIP_POST_SEC=${CLIP_POST_SEC:-6}
      - CLIP_COOLDOWN_S=${CLIP_COOLDOWN_S:-30.0}
      - ABNORMAL_TIMEOUT_S=${ABNORMAL_TIMEOUT_S:-10.0}
      - KP_EMA_ENABLE=${KP_EMA_ENABLE:-1}
      - KP_EMA_ALPHA=${KP_EMA_ALPHA:-0.5}
      - KP_MIN_CONF=${KP_MIN_CONF:-0.30}

    # (2) 카메라 디바이스 전달
    devices:
      - "/dev/video0:/dev/video0"

    # (3) runs 폴더 영속화(호스트에 파일 남기기)
    volumes:
      - ".:/app"
      - "./runs:/app/runs"

    # (4) 권한 문제 줄이기(선택)
    # Jetson 환경마다 다르지만 /dev/video0 접근 때문에 필요할 수 있음
    group_add:
      - "video"

    # (5) 재시작 정책(개발 중이면 off도 가능)
    restart: unless-stopped
